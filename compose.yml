services:
  windows:
    image: dockurr/windows
    container_name: ubuntu
    environment:
      VERSION: "https://ubuntu.com/download/desktop/thank-you?version=26.04&architecture=amd64&lts=true"
      KVM: "N"
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m
